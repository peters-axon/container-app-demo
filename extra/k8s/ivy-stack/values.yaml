# -------------------------------------------------------
# Axon Ivy Engine
# -------------------------------------------------------
ivy:
  image:
    repository: ghcr.io/peters-axon/container-app-demo
    tag: "latest"
    pullPolicy: IfNotPresent

  replicaCount: 3

  service:
    port: 8080
    annotations:
      traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
      traefik.ingress.kubernetes.io/service.sticky.cookie.name: "axonivy-sticky"

  ingress:
    enabled: true
    className: ""
    host: axonivy.localhost
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
      traefik.ingress.kubernetes.io/router.tls: "true"

  persistence:
    data:
      size: 1Gi
    applications:
      size: 1Gi

  db:
    name: IvySystemDB
    user: sa

  search:
    port: 9200

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 2Gi

# -------------------------------------------------------
# MS SQL Server 2022 (Developer Edition – free for dev/test)
# Sub-chart: simcubeltd/mssqlserver-2022 (alias: mssql)
# -------------------------------------------------------
mssql:
  enabled: true

  ACCEPT_EULA:
    value: "Y"

  MSSQL_PID:
    value: Developer

  persistence:
    enabled: true
    size: 8Gi

# -------------------------------------------------------
# OpenSearch (single node)
# Sub-chart: opensearch-project/opensearch
# -------------------------------------------------------
opensearch:
  enabled: true
  singleNode: true
  replicas: 1

  persistence:
    enabled: true
    size: 8Gi

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1
      memory: 2Gi

  extraEnvs:
    - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: ivy12-opensearch-secret
          key: admin-password
    - name: DISABLE_SECURITY_PLUGIN
      value: "true"
  